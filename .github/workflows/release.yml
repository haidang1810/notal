name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Notal ${{ github.ref_name }}'
          releaseBody: |
            ## Notal ${{ github.ref_name }}

            Smart note-taking desktop app with AI-powered memory layers.

            ### Downloads
            | OS | File | Notes |
            |---|---|---|
            | Linux | `.deb`, `.AppImage` | Ubuntu/Debian |
            | macOS (Apple Silicon) | `.dmg` | M1/M2/M3 |
            | macOS (Intel) | `.dmg` | Intel Macs |
            | Windows | `.msi`, `.exe` | Windows 10/11 |
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
